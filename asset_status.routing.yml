entity.node.asset_status.maintenance:
  path: '/node/{node}/maintenance'
  defaults:
    _controller: '\Drupal\asset_status\Controller\AssetLogController::addMaintenance'
    _title: 'Record Maintenance'
  requirements:
    _custom_access: '\Drupal\asset_status\Controller\AssetLogController::accessMaintenance'
    node: \d+
  options:
    _admin_route: TRUE

entity.node.asset_status.history:
  path: '/node/{node}/asset-history'
  defaults:
    _controller: '\Drupal\asset_status\Controller\AssetLogController::history'
    _title: 'Maintenance History'
  requirements:
    _custom_access: '\Drupal\asset_status\Controller\AssetLogController::accessHistory'
    node: \d+
  options:
    _admin_route: TRUE

asset_status.settings:
  path: '/admin/config/content/asset-status'
  defaults:
    _form: '\Drupal\asset_status\Form\AssetStatusSettingsForm'
    _title: 'Asset status settings'
  requirements:
    _permission: 'administer asset log entries'

asset_status.tool_status_board:
  path: '/equipment/status'
  defaults:
    _controller: '\Drupal\asset_status\Controller\ToolStatusBoardController::board'
    _title: 'Equipment Status'
  requirements:
    _permission: 'access content'

asset_status.maintenance_dashboard:
  path: '/admin/content/asset-maintenance'
  defaults:
    _controller: '\Drupal\asset_status\Controller\MaintenanceDashboardController::dashboard'
    _title: 'Maintenance Queue'
  requirements:
    _permission: 'review asset status reports'
  options:
    _admin_route: TRUE

asset_status.quick_status_update:
  path: '/admin/content/asset-maintenance/update/{node}'
  defaults:
    _form: '\Drupal\asset_status\Form\AssetQuickStatusForm'
    _title: 'Update Tool Status'
  requirements:
    _permission: 'review asset status reports'
    node: \d+
  options:
    _admin_route: TRUE
